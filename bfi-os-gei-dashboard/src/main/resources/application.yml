# ============================================================
#  Configuration Spring Boot avec SQL Server
#  Remplace le fichier src/main/resources/application.yml
# ============================================================
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=bfios_gei;encrypt=true;trustServerCertificate=true
    username: sa
    password: "20021123"           # ← votre mot de passe, entre guillemets
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate           # ← Hibernate valide seulement (ne crée rien)
    show-sql: false                # ← passer à true pour debug
    # NE PAS mettre "dialect" — Hibernate 6 le détecte tout seul
# CORS
bfi:
  cors:
    allowed-origins: "*"

# Logging
logging:
  level:
    com.bfios.gei.dashboard: INFO
    org.hibernate.SQL: WARN           # passer à INFO pour voir les requêtes SQL
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
